replicaCount: 1

image:
  repository: postgres
  tag: "16.4-alpine"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 5432

postgresql:
  database: appdb
  username: appuser
  passwordSecretName: postgresql-credentials
  passwordSecretKey: password
  hostSecretName: postgresql-credentials
  hostSecretKey: host

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi

storage:
  size: 10Gi
  storageClass: local-path

nodeSelector: {}

affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - worker-01

tolerations: []

externalSecrets:
  enabled: false
  secretStore:
    name: openbao-backend
    kind: SecretStore
  remoteRef:
    key: "postgresql/credentials"
