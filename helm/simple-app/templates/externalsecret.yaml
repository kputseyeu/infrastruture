{{- if .Values.externalSecrets.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "simple-app.fullname" . }}-externalsecret
  labels:
    {{- include "simple-app.labels" . | nindent 4 }}
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStore.name }}
    kind: {{ .Values.externalSecrets.secretStore.kind }}
  target:
    name: {{ include "simple-app.fullname" . }}-secrets
    creationPolicy: Owner
  data:
    - secretKey: VAULT_TOKEN
      remoteRef:
        key: {{ .Values.externalSecrets.remoteRef.key }}
        property: {{ .Values.externalSecrets.remoteRef.property }}
{{- end }}
