---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: postgresql-eso-sa
  namespace: default
---
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: openbao-backend
  namespace: default
spec:
  provider:
    vault:
      server: "https://10.10.0.30:8200"
      path: "secrets"
      version: "v2"
      caBundle: ""
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "postgresql-role"
          serviceAccountRef:
            name: "postgresql-eso-sa"
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: postgresql-credentials
  namespace: default
spec:
  refreshInterval: "5m"
  secretStoreRef:
    name: openbao-backend
    kind: SecretStore
  target:
    name: postgresql-credentials
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: "postgresql/credentials"
        property: password
    - secretKey: host
      remoteRef:
        key: "postgresql/credentials"
        property: host
